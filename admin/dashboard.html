<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 대시보드 — ShareWe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', sans-serif; background: #f1f5f9; color: #1e293b; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: 240px;
      background: #0f172a; display: flex; flex-direction: column; z-index: 10;
    }
    .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid #1e293b; }
    .sidebar-logo .name { font-size: 1.2rem; font-weight: 800; color: #60a5fa; }
    .sidebar-logo .sub { font-size: 0.75rem; color: #475569; margin-top: 2px; }
    nav { flex: 1; padding: 16px 0; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 20px; color: #94a3b8;
      cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
      border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover, .nav-item.active { background: #1e293b; color: #fff; }
    .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid #1e293b; }
    .admin-info { font-size: 0.8rem; color: #475569; margin-bottom: 10px; word-break: break-all; }
    .btn-logout {
      width: 100%; padding: 8px; background: #1e293b; color: #94a3b8;
      border: none; border-radius: 8px; font-family: inherit;
      font-size: 0.85rem; cursor: pointer; transition: 0.2s;
    }
    .btn-logout:hover { background: #dc2626; color: #fff; }

    /* Main */
    .main { margin-left: 240px; min-height: 100vh; }
    .topbar {
      background: #fff; padding: 16px 32px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 5;
    }
    .topbar h1 { font-size: 1.2rem; font-weight: 700; }
    .topbar .badge { background: #dbeafe; color: #2563eb; font-size: 0.78rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .content { padding: 32px; }

    /* Page sections */
    .page { display: none; }
    .page.active { display: block; }

    /* Stats */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: #fff; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; }
    .stat-card .label { font-size: 0.82rem; color: #64748b; margin-bottom: 8px; }
    .stat-card .value { font-size: 2rem; font-weight: 800; color: #0f172a; }
    .stat-card .icon { font-size: 1.5rem; float: right; margin-top: -36px; }

    /* Table */
    .section-card { background: #fff; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; margin-bottom: 24px; }
    .section-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: #0f172a; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 10px 12px; font-size: 0.8rem; color: #64748b; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
    td { padding: 12px; font-size: 0.88rem; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .badge-type { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; }
    .badge-bug { background: #fee2e2; color: #dc2626; }
    .badge-feature { background: #dbeafe; color: #2563eb; }
    .badge-usage { background: #d1fae5; color: #059669; }
    .badge-other { background: #f1f5f9; color: #64748b; }
    .empty { text-align: center; color: #94a3b8; padding: 32px; font-size: 0.9rem; }

    /* Admins */
    .admin-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
    .admin-row:last-child { border-bottom: none; }
    .admin-row .info .email { font-size: 0.9rem; font-weight: 600; }
    .admin-row .info .role { font-size: 0.78rem; color: #64748b; }
    .admin-row .info .role.super { color: #2563eb; font-weight: 600; }
    .btn-remove { background: #fee2e2; color: #dc2626; border: none; padding: 5px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: inherit; font-weight: 600; }
    .btn-remove:hover { background: #dc2626; color: #fff; }

    /* Add Admin Form */
    .add-form { display: flex; gap: 12px; margin-top: 20px; }
    .add-form input {
      flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none;
    }
    .add-form input:focus { border-color: #2563eb; }
    .add-form select {
      padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 8px; font-family: inherit; font-size: 0.9rem; outline: none;
    }
    .btn-add {
      padding: 10px 20px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-family: inherit;
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
    }
    .btn-add:hover { background: #1d4ed8; }
    .msg { margin-top: 12px; font-size: 0.85rem; }
    .msg.success { color: #059669; }
    .msg.error { color: #dc2626; }

    /* Inquiry detail */
    .inquiry-body { background: #f8fafc; border-radius: 8px; padding: 12px; font-size: 0.85rem; line-height: 1.6; margin-top: 4px; white-space: pre-wrap; word-break: break-word; }

    @media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="name">ShareWe</div>
      <div class="sub">Admin Dashboard</div>
    </div>
    <nav>
      <button class="nav-item active" onclick="showPage('overview')">
        <span class="icon">📊</span> 개요
      </button>
      <button class="nav-item" onclick="showPage('inquiries')">
        <span class="icon">💬</span> 문의 관리
      </button>
      <button class="nav-item" onclick="showPage('admins')">
        <span class="icon">👤</span> 관리자 관리
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="admin-info" id="adminEmail">로딩 중...</div>
      <button class="btn-logout" id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1 id="pageTitle">개요</h1>
      <span class="badge" id="adminRole">관리자</span>
    </div>
    <div class="content">

      <!-- 개요 -->
      <div class="page active" id="page-overview">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="label">전체 사용자</div>
            <div class="value" id="statUsers">-</div>
            <div class="icon">👤</div>
          </div>
          <div class="stat-card">
            <div class="label">전체 그룹</div>
            <div class="value" id="statGroups">-</div>
            <div class="icon">👥</div>
          </div>
          <div class="stat-card">
            <div class="label">전체 거래</div>
            <div class="value" id="statTx">-</div>
            <div class="icon">💳</div>
          </div>
          <div class="stat-card">
            <div class="label">미답변 문의</div>
            <div class="value" id="statInquiries">-</div>
            <div class="icon">💬</div>
          </div>
        </div>
        <div class="section-card">
          <h3>최근 문의 (5건)</h3>
          <table>
            <thead><tr><th>유형</th><th>제목</th><th>이메일</th><th>날짜</th></tr></thead>
            <tbody id="recentInquiries"><tr><td colspan="4" class="empty">로딩 중...</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- 문의 관리 -->
      <div class="page" id="page-inquiries">
        <div class="section-card">
          <h3>전체 문의</h3>
          <table>
            <thead><tr><th>유형</th><th>제목 / 내용</th><th>이메일</th><th>이름</th><th>날짜</th></tr></thead>
            <tbody id="allInquiries"><tr><td colspan="5" class="empty">로딩 중...</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- 관리자 관리 -->
      <div class="page" id="page-admins">
        <div class="section-card">
          <h3>관리자 목록</h3>
          <div id="adminList"><div class="empty">로딩 중...</div></div>
          <div id="addAdminSection" style="display:none; margin-top:24px; border-top:1px solid #e2e8f0; padding-top:20px;">
            <h3 style="margin-bottom:4px;">관리자 추가</h3>
            <p style="font-size:0.82rem;color:#64748b;margin-bottom:12px;">Firebase Authentication에 등록된 이메일만 추가 가능합니다.</p>
            <div class="add-form">
              <input type="email" id="newAdminEmail" placeholder="추가할 관리자 이메일" />
              <select id="newAdminRole">
                <option value="admin">일반 관리자</option>
                <option value="super_admin">슈퍼 관리자</option>
              </select>
              <button class="btn-add" id="addAdminBtn">추가</button>
            </div>
            <div class="msg" id="addAdminMsg"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-auth.js';
    import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCsks3_8Ht1wqhlO6xf2CJpmxxHEIMueJA",
      authDomain: "weshare-bf718.firebaseapp.com",
      projectId: "weshare-bf718",
      storageBucket: "weshare-bf718.firebasestorage.app",
      messagingSenderId: "1031016957737",
      appId: "1:1031016957737:web:e386d6d2e6027d87949938"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentRole = null;

    // 페이지 전환
    window.showPage = (name) => {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => {
        if (n.getAttribute('onclick')?.includes(name)) n.classList.add('active');
      });
      const titles = { overview: '개요', inquiries: '문의 관리', admins: '관리자 관리' };
      document.getElementById('pageTitle').textContent = titles[name] || name;
      if (name === 'inquiries') loadAllInquiries();
      if (name === 'admins') loadAdmins();
    };

    // 인증 상태 확인
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/admin/'; return; }
      const adminDoc = await getDoc(doc(db, 'admins', user.uid));
      if (!adminDoc.exists()) { await signOut(auth); window.location.href = '/admin/'; return; }

      currentUser = user;
      currentRole = adminDoc.data().role;
      document.getElementById('adminEmail').textContent = user.email;
      document.getElementById('adminRole').textContent = currentRole === 'super_admin' ? '슈퍼 관리자' : '관리자';
      loadOverview();
    });

    // 로그아웃
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '/admin/';
    });

    // 날짜 포맷
    function formatDate(ts) {
      if (!ts) return '-';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('ko-KR') + ' ' + d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    // 유형 배지
    function typeBadge(type) {
      const map = { bug: ['bug', '버그'], feature: ['feature', '기능요청'], usage: ['usage', '사용문의'], other: ['other', '기타'] };
      const [cls, label] = map[type] || ['other', type || '기타'];
      return `<span class="badge-type badge-${cls}">${label}</span>`;
    }

    // 개요 로드
    async function loadOverview() {
      try {
        const [users, groups, txs, inquiries] = await Promise.all([
          getDocs(collection(db, 'users')),
          getDocs(collection(db, 'groups')),
          getDocs(collection(db, 'transactions')),
          getDocs(collection(db, 'inquiries')),
        ]);
        document.getElementById('statUsers').textContent = users.size;
        document.getElementById('statGroups').textContent = groups.size;
        document.getElementById('statTx').textContent = txs.size;
        document.getElementById('statInquiries').textContent = inquiries.size;

        // 최근 문의 5건
        const inqList = inquiries.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0))
          .slice(0, 5);

        const tbody = document.getElementById('recentInquiries');
        if (inqList.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="empty">문의가 없습니다</td></tr>';
        } else {
          tbody.innerHTML = inqList.map(i => `
            <tr>
              <td>${typeBadge(i.type)}</td>
              <td>${i.subject || '-'}</td>
              <td>${i.email || '-'}</td>
              <td>${formatDate(i.createdAt)}</td>
            </tr>`).join('');
        }
      } catch (e) {
        console.error(e);
      }
    }

    // 전체 문의 로드
    async function loadAllInquiries() {
      try {
        const snap = await getDocs(collection(db, 'inquiries'));
        const list = snap.docs
          .map(d => ({ id: d.id, ...d.data() }))
          .sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

        const tbody = document.getElementById('allInquiries');
        if (list.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">문의가 없습니다</td></tr>';
        } else {
          tbody.innerHTML = list.map(i => `
            <tr>
              <td>${typeBadge(i.type)}</td>
              <td>
                <div style="font-weight:600">${i.subject || '-'}</div>
                <div class="inquiry-body">${i.message || ''}</div>
              </td>
              <td>${i.email || '-'}</td>
              <td>${i.name || '-'}</td>
              <td>${formatDate(i.createdAt)}</td>
            </tr>`).join('');
        }
      } catch (e) {
        console.error(e);
      }
    }

    // 관리자 목록 로드
    async function loadAdmins() {
      try {
        const snap = await getDocs(collection(db, 'admins'));
        const list = snap.docs.map(d => ({ uid: d.id, ...d.data() }));
        const container = document.getElementById('adminList');
        container.innerHTML = list.map(a => `
          <div class="admin-row">
            <div class="info">
              <div class="email">${a.email || a.uid}</div>
              <div class="role ${a.role === 'super_admin' ? 'super' : ''}">${a.role === 'super_admin' ? '슈퍼 관리자' : '일반 관리자'}</div>
            </div>
            ${currentRole === 'super_admin' && a.uid !== currentUser.uid
              ? `<button class="btn-remove" onclick="removeAdmin('${a.uid}')">제거</button>`
              : ''}
          </div>`).join('');

        // 슈퍼 관리자만 추가 기능 표시
        if (currentRole === 'super_admin') {
          document.getElementById('addAdminSection').style.display = 'block';
        }
      } catch (e) {
        console.error(e);
      }
    }

    // 관리자 제거
    window.removeAdmin = async (uid) => {
      if (!confirm('이 관리자를 제거하시겠습니까?')) return;
      await deleteDoc(doc(db, 'admins', uid));
      loadAdmins();
    };

    // 관리자 추가
    document.getElementById('addAdminBtn').addEventListener('click', async () => {
      const email = document.getElementById('newAdminEmail').value.trim();
      const role = document.getElementById('newAdminRole').value;
      const msgEl = document.getElementById('addAdminMsg');
      if (!email) return;

      try {
        // Firebase Auth에서 이메일로 UID 조회 불가 → users 컬렉션에서 검색
        const usersSnap = await getDocs(collection(db, 'users'));
        const userDoc = usersSnap.docs.find(d => d.data().email === email);
        if (!userDoc) {
          msgEl.className = 'msg error';
          msgEl.textContent = '해당 이메일로 가입된 사용자가 없습니다.';
          return;
        }
        await setDoc(doc(db, 'admins', userDoc.id), {
          email, role, addedAt: new Date(), addedBy: currentUser.uid
        });
        msgEl.className = 'msg success';
        msgEl.textContent = `${email} 관리자로 추가했습니다.`;
        document.getElementById('newAdminEmail').value = '';
        loadAdmins();
      } catch (e) {
        msgEl.className = 'msg error';
        msgEl.textContent = '추가 중 오류가 발생했습니다.';
      }
    });
  </script>
</body>
</html>
